[build]
  functions = "netlify/functions"

# Tools page POSTs here; static hosting has no Flask — route to serverless demo JSON
[[redirects]]
  from = "/try-on"
  to = "/.netlify/functions/try-on"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# QuickTime previews: correct MIME helps <video> on some browsers/CDNs
[[headers]]
  for = "/static/*.mov"
  [headers.values]
    Content-Type = "video/quicktime"
